services:
  weflow-web:
    image: weflow-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weflow-web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEFLOW_WEB_PORT:-3000}:3000"
    restart: unless-stopped
    stop_grace_period: 30s
